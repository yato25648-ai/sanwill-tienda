<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="NETFLIX">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#120404"/>
      <stop offset="55%" stop-color="#8B0000"/>
      <stop offset="100%" stop-color="#E50914"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#ff4d4d" stop-opacity="0.48"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#glow)"/>

  <g opacity="0.22">
    <circle cx="1120" cy="150" r="240" fill="#ffffff"/>
    <circle cx="150" cy="620" r="220" fill="#ffffff"/>
  </g>

  <g opacity="0.25">
    <polygon points="760,720 890,360 1040,720" fill="#000"/>
    <polygon points="870,720 1010,280 1170,720" fill="#000"/>
    <polygon points="1010,720 1130,420 1240,720" fill="#000"/>
  </g>

  <rect x="60" y="60" width="1160" height="600" rx="36" fill="rgba(3,7,18,0.45)" stroke="rgba(255,255,255,0.18)"/>
  <rect x="88" y="88" width="8" height="544" fill="#E50914"/>

  <text x="120" y="220" fill="#fff" style="font-family:Arial,Helvetica,sans-serif;font-weight:900;font-size:90px;letter-spacing:2px;" filter="url(#softGlow)">NETFLIX</text>
  <text x="120" y="292" fill="#e2e8f0" style="font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:36px;letter-spacing:.5px;">Stranger Things • The Crown • Wednesday</text>

  <rect x="120" y="344" width="520" height="78" rx="14" fill="rgba(0,0,0,0.38)" stroke="rgba(255,255,255,0.22)"/>
  <text x="150" y="394" fill="#fff" style="font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:34px;">STREAMING TOP</text>

  <text x="120" y="492" fill="#cbd5e1" style="font-family:Arial,Helvetica,sans-serif;font-size:26px;">Activación rápida • Soporte directo • Pedido por WhatsApp</text>
  <text x="120" y="545" fill="#cbd5e1" style="font-family:Arial,Helvetica,sans-serif;font-size:24px;">Diseño moderno para catálogo digital de tuplataforma</text>

  <g opacity="0.9">
    <circle cx="1010" cy="520" r="90" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.25)"/>
    <circle cx="1120" cy="450" r="58" fill="rgba(0,0,0,0.28)" stroke="rgba(255,255,255,0.2)"/>
    <circle cx="1145" cy="570" r="42" fill="rgba(0,0,0,0.22)" stroke="rgba(255,255,255,0.2)"/>
  </g>
</svg>
